{{- if .Values.extractionApi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-findface-extraction-api
  labels:
    app.kubernetes.io/name: findface
    app.kubernetes.io/component: extraction-api
data:
  findface-extraction-api.ini: |
    detectors:
      max_batch_size: 1
      models:
        face_jasmine:
          aliases:
          - face
          - nnd
          - cheetah
          model: detector/facedet.kali.005.gpu.fnk
          options:
            min_object_size: 32
            resolutions:
            - 2048x2048
        body_gustav:
          aliases:
          - body
          - edie
          - shiloette
          - glen
          model: detector/bodydet.kali_accurate.021.gpu.fnk
          options:
            min_object_size: 32
            resolutions:
            - 2048x2048
    objects:
      bag:
        base_normalizer: ''
        quality_attribute: ''
      bear:
        base_normalizer: ''
        quality_attribute: ''
      body:
        base_normalizer: facenorm/cropbbox.v2.gpu.fnk
        quality_attribute: body_quality
      car:
        base_normalizer: ''
        quality_attribute: ''
      cat:
        base_normalizer: ''
        quality_attribute: ''
      container:
        base_normalizer: ''
        quality_attribute: ''
      container_number:
        base_normalizer: ''
        quality_attribute: ''
      dog:
        base_normalizer: ''
        quality_attribute: ''
      dumpster:
        base_normalizer: ''
        quality_attribute: ''
      dumpster_enclosure:
        base_normalizer: ''
        quality_attribute: ''
      face:
        base_normalizer: facenorm/crop2x.v2_maxsize400.gpu.fnk
        quality_attribute: face_quality
      fire:
        base_normalizer: ''
        quality_attribute: ''
      garbage:
        base_normalizer: ''
        quality_attribute: ''
      graffiti:
        base_normalizer: ''
        quality_attribute: ''
      head:
        base_normalizer: ''
        quality_attribute: ''
      license_plate:
        base_normalizer: ''
        quality_attribute: ''
      merch:
        base_normalizer: ''
        quality_attribute: ''
      pet_face:
        base_normalizer: ''
        quality_attribute: ''
      pothole:
        base_normalizer: ''
        quality_attribute: ''
      snowpile:
        base_normalizer: ''
        quality_attribute: ''
      streetlight:
        base_normalizer: ''
        quality_attribute: ''
      trash_bin:
        base_normalizer: ''
        quality_attribute: ''
      visible_gas:
        base_normalizer: ''
        quality_attribute: ''
    normalizers:
      max_batch_size: 8
      models:
        amethyst1x4:
          model: ''
        amethyst1x16:
          model: ''
        amethyst2x4:
          model: ''
        amethyst2x8:
          model: ''
        carlicplate:
          model: ''
        containernumber:
          model: ''
        crop1x:
          model: facenorm/crop1x.v2_maxsize400.gpu.fnk
        crop2x:
          model: facenorm/crop2x.v2_maxsize400.gpu.fnk
        cropbbox:
          model: facenorm/cropbbox.v2.gpu.fnk
        multicrop_full_center:
          model: ''
        multicrop_full_crop2x:
          model: facenorm/facenorm.multicrop_full_crop2x_size400.gpu.fnk
        norm200:
          model: facenorm/bee.v3.gpu.fnk
    extractors:
      max_batch_size: 8
      models:
        body_action_base6:
          default:
            model: ''
        body_action_car:
          default:
            model: ''
        body_action_fights:
          default:
            model: ''
        body_age_gender:
          default:
            model: ''
        body_bags:
          default:
            model: ''
        body_clothes:
          default:
            model: ''
        body_clothes34671:
          default:
            model: ''
        body_color:
          default:
            model: ''
        body_emben:
          default:
            model: pedrec/pedrec.durga.gpu.fnk
        body_fall:
          default:
            model: ''
        body_handface:
          default:
            model: ''
        body_mideast_clothes:
          default:
            model: ''
        body_protective_equipment:
          default:
            model: ''
        body_quality:
          default:
            model: pedattr/pedattr.quality.v0.gpu.fnk
        car_categories:
          default:
            model: ''
        car_color:
          default:
            model: ''
        car_container_number:
          default:
            model: ''
        car_description:
          default:
            model: ''
        car_emben:
          default:
            model: ''
        car_license_plate:
          default:
            model: ''
        car_license_plate_quality:
          default:
            model: ''
        car_license_plate_visibility:
          default:
            model: ''
        car_make:
          default:
