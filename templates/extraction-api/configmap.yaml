        face_emben:
          default:
            model: face/nectarine_l_320.gpu.fnk
        face_emotions:
          default:
            model: ''
        face_eyes_attrs:
          default:
            model: ''
        face_eyes_openness:
          default:
            model: ''
        face_gender:
          default:
            model: faceattr/faceattr.gender.v3.gpu.fnk
        face_glasses3:
          default:
            model: ''
        face_glasses4:
          default:
            model: ''
        face_hair:
          default:
            model: ''
        face_headpose:
          default:
            model: ''
        face_headwear:
          default:
            model: ''
        face_highlight:
          default:
            model: ''
        face_liveness:
          default:
            model: faceattr/faceattr.liveness_web.v1.gpu.fnk
        face_luminance_overexposure:
          default:
