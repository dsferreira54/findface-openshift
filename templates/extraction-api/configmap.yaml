        car_special_types12:
          default:
            model: ''
        car_trash:
          default:
            model: ''
        car_weight_types7:
          default:
            model: ''
        container_number:
          default:
            model: ''
        container_quality_number:
          default:
            model: ''
        crowd_count:
          default:
            model: ''
        dumpster_types22:
          default:
            model: ''
        dumpster_types23:
          default:
            model: ''
        face_age:
          default:
            model: faceattr/faceattr.age.v3.gpu.fnk
        face_beard:
          default:
            model: ''
        face_beard4:
          default:
            model: ''
        face_countries47:
