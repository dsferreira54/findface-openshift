        head_motohelmet:
          default:
            model: ''
        license_plate_quality:
          default:
            model: ''
        merch_emben:
          default:
            model: ''
        pet_face_emben:
          default:
            model: ''
        street_light_working:
          default:
            model: ''
        trash_bin_filled:
          default:
            model: ''
    ascend_device: 0
    gpu_device: {{ .Values.extractionApi.cudaVisibleDevices }}
    models_root: /usr/share/findface-data/models
    cache_dir: /var/cache/findface/models_cache
    listen: {{ .Values.extractionApi.config.listenHost }}:{{ .Values.extractionApi.service.port }}
    license_ntls_server: {{ .Values.externalDependencies.ntlsAddress }}
    fetch:
      enabled: true
      size_limit: 10485760
    max_dimension: 6000
    allow_cors: false
    ticker_interval: 5000
    debug: false
    prometheus:
      timing_buckets:
      - 0.001
      - 0.005
      - 0.01
      - 0.02
      - 0.03
      - 0.05
      - 0.1
      - 0.2
      - 0.3
      - 0.5
      - 0.75
      - 0.9
      - 1
      - 1.1
      - 1.3
      - 1.5
      - 1.7
      - 2
      - 3
      - 5
      - 10
      - 20
      - 30
      - 50
      resolution_buckets:
      - 10000
      - 20000
      - 40000
      - 80000
      - 100000
      - 200000
      - 400000
      - 800000
      - 1e+06
      - 2e+06
      - 3e+06
      - 4e+06
      - 5e+06
      - 6e+06
      - 8e+06
      - 1e+07
      - 12000000.0
      - 15000000.0
      - 18000000.0
      - 2e+07
      - 3e+07
      - 5e+07
      - 1e+08
      faces_buckets:
      - 0
      - 1
      - 2
      - 5
      - 10
      - 20
      - 50
      - 75
      - 100
      - 200
