{{- if .Values.extractionApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-findface-extraction-api
  labels:
    app.kubernetes.io/name: findface
    app.kubernetes.io/component: extraction-api
spec:
  replicas: {{ .Values.extractionApi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: findface
      app.kubernetes.io/component: extraction-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: findface
        app.kubernetes.io/component: extraction-api
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      hostNetwork: {{ .Values.extractionApi.hostNetwork }}
      dnsPolicy: {{ if .Values.extractionApi.hostNetwork }}ClusterFirstWithHostNet{{ else }}{{ .Values.extractionApi.dnsPolicy }}{{ end }}
{{- with .Values.extractionApi.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: findface-extraction-api
          image: "{{ .Values.extractionApi.image.repository }}:{{ .Values.extractionApi.image.tag }}"
          imagePullPolicy: {{ .Values.extractionApi.image.pullPolicy }}
          args:
{{- range .Values.extractionApi.args }}
            - {{ . | quote }}
{{- end }}
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: {{ .Values.extractionApi.cudaVisibleDevices | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.extractionApi.service.port }}
              protocol: TCP
{{- with .Values.extractionApi.containerSecurityContext }}
          securityContext:
{{ toYaml . | indent 12 }}
{{- end }}
          resources:
            requests:
              cpu: {{ .Values.extractionApi.resources.requests.cpu }}
              memory: {{ .Values.extractionApi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.extractionApi.resources.limits.cpu }}
              memory: {{ .Values.extractionApi.resources.limits.memory }}
{{- if .Values.extractionApi.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.extractionApi.gpu.count }}
{{- end }}
          volumeMounts:
            - name: extraction-config
              mountPath: /etc/findface-extraction-api.ini
              subPath: findface-extraction-api.ini
              readOnly: true
            - name: models
              mountPath: /usr/share/findface-data/models
              readOnly: true
            - name: extraction-cache
              mountPath: /var/cache/findface/models_cache
      volumes:
        - name: extraction-config
          configMap:
            name: {{ .Release.Name }}-findface-extraction-api
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-findface-models
        - name: extraction-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-findface-extraction-cache
{{- with .Values.extractionApi.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.extractionApi.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.extractionApi.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
