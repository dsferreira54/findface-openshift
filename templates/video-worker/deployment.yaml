{{- if .Values.videoWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-findface-video-worker
  labels:
    app.kubernetes.io/name: findface
    app.kubernetes.io/component: video-worker
spec:
  replicas: {{ .Values.videoWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: findface
      app.kubernetes.io/component: video-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: findface
        app.kubernetes.io/component: video-worker
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      hostNetwork: {{ .Values.videoWorker.hostNetwork }}
      dnsPolicy: {{ if .Values.videoWorker.hostNetwork }}ClusterFirstWithHostNet{{ else }}{{ .Values.videoWorker.dnsPolicy }}{{ end }}
{{- with .Values.videoWorker.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: findface-video-worker
          image: "{{ .Values.videoWorker.image.repository }}:{{ .Values.videoWorker.image.tag }}"
          imagePullPolicy: {{ .Values.videoWorker.image.pullPolicy }}
          args:
{{- range .Values.videoWorker.args }}
            - {{ . | quote }}
{{- end }}
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: {{ .Values.videoWorker.cudaVisibleDevices | quote }}
          ports:
            - name: streamer
              containerPort: {{ .Values.videoWorker.service.port }}
              protocol: TCP
{{- with .Values.videoWorker.containerSecurityContext }}
          securityContext:
{{ toYaml . | indent 12 }}
{{- end }}
          resources:
            requests:
              cpu: {{ .Values.videoWorker.resources.requests.cpu }}
              memory: {{ .Values.videoWorker.resources.requests.memory }}
            limits:
              cpu: {{ .Values.videoWorker.resources.limits.cpu }}
              memory: {{ .Values.videoWorker.resources.limits.memory }}
{{- if .Values.videoWorker.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.videoWorker.gpu.count }}
{{- end }}
          volumeMounts:
            - name: video-worker-config
              mountPath: /etc/findface-video-worker.yaml
              subPath: findface-video-worker.yaml
              readOnly: true
            - name: models
              mountPath: /usr/share/findface-data/models
              readOnly: true
            - name: video-worker-cache
              mountPath: /var/cache/findface/models_cache
            - name: video-worker-recorder
              mountPath: /var/cache/findface/video-worker-recorder
      volumes:
        - name: video-worker-config
          configMap:
            name: {{ .Release.Name }}-findface-video-worker
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-findface-models
        - name: video-worker-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-findface-video-worker-cache
        - name: video-worker-recorder
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-findface-video-worker-recorder
{{- with .Values.videoWorker.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.videoWorker.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.videoWorker.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
